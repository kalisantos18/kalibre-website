<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>KDL Scroll Experience</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700;900&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
overflow:hidden;
background:black;
color:white;
}

/* ===== GALAXY BACKGROUND ===== */
canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

/* ===== SCROLL CONTAINER ===== */
.container{
height:100vh;
overflow-y:scroll;
scroll-snap-type:y mandatory;
}

/* ===== PAGES ===== */
.page{
height:100vh;
scroll-snap-align:start;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:40px;
}

/* ===== TEXT ===== */
h1{
font-size:4rem;
}

span{
color:#00f0ff;
}

p{
opacity:0.7;
max-width:600px;
margin-top:20px;
}

/* ===== CARDS ===== */
.grid{
display:flex;
gap:20px;
margin-top:40px;
flex-wrap:wrap;
justify-content:center;
}

.card{
background:rgba(255,255,255,0.05);
padding:25px;
width:250px;
border-radius:15px;
border:1px solid rgba(255,255,255,0.1);
transition:0.4s;
}

.card:hover{
transform:scale(1.05);
border-color:#00f0ff;
}
</style>
</head>

<body>

<!-- GALAXY -->
<canvas id="bg"></canvas>

<!-- SCROLL PAGES -->
<div class="container">

<!-- HOME -->
<section class="page">
<h1>Kalibre <span>Digital Labs</span></h1>
<p>We build high-performance digital systems that scale businesses.</p>
</section>

<!-- SERVICES -->
<section class="page">
<h1>Services</h1>
<div class="grid">
<div class="card">Web Development</div>
<div class="card">Branding</div>
<div class="card">SEO Growth</div>
</div>
</section>

<!-- PRICING -->
<section class="page">
<h1>Pricing</h1>
<div class="grid">
<div class="card">Entry R799</div>
<div class="card">Growth R1399</div>
<div class="card">Premium R2199</div>
</div>
</section>

<!-- PORTFOLIO -->
<section class="page">
<h1>Portfolio</h1>
<div class="grid">
<div class="card">Project A</div>
<div class="card">Project B</div>
<div class="card">Project C</div>
</div>
</section>

<!-- CONTACT -->
<section class="page">
<h1>Contact</h1>
<p>support@kalibredigitallabs.com</p>
<p>+27 62 541 1075</p>
</section>

</div>

<!-- GALAXY SCRIPT -->
<script>

let scene=new THREE.Scene();
let camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
let renderer=new THREE.WebGLRenderer({canvas:document.getElementById("bg"),alpha:true});
renderer.setSize(innerWidth,innerHeight);

let geo=new THREE.BufferGeometry();
let vertices=[];

for(let i=0;i<5000;i++){
vertices.push((Math.random()-0.5)*2000);
vertices.push((Math.random()-0.5)*2000);
vertices.push((Math.random()-0.5)*2000);
}

geo.setAttribute("position",new THREE.Float32BufferAttribute(vertices,3));

let mat=new THREE.PointsMaterial({color:0x00f0ff,size:1});
let stars=new THREE.Points(geo,mat);

scene.add(stars);
camera.position.z=5;

function animate(){
requestAnimationFrame(animate);
stars.rotation.y+=0.0005;
renderer.render(scene,camera);
}
animate();

</script>

</body>
</html>
